server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # react-snap writes prerendered markup as <route>/index.html (e.g.
        # /masters/index.html). Serve that when it exists ($uri/), fall back to
        # the SPA shell for any route without a prerender.
        try_files $uri $uri/ /index.html;
    }
}
